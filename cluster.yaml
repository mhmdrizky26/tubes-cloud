apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: mindspark
  region: us-east-1
  version: "1.31"

vpc:
  id: "vpc-07a22c61ab92d077e"
  subnets:
    public:
      us-east-1a:
        id: "subnet-0e2531b6c8220191d"
      us-east-1b:
        id: "subnet-02b35aef58d4fbc3d"
    private:
      us-east-1a:
        id: "subnet-01ed3125c2fbaf21b"
      us-east-1b:
        id: "subnet-0c824263cad57a09f"
  clusterEndpoints:
    publicAccess: true
    privateAccess: true

iam:
  withOIDC: true

managedNodeGroups:
  - name: mindspark-nodes
    instanceType: m7i-flex.large
    desiredCapacity: 2
    minSize: 2
    maxSize: 6
    volumeSize: 30
    privateNetworking: true
    labels:
      role: workers
    tags:
      k8s.io/cluster-autoscaler/enabled: "true"
      k8s.io/cluster-autoscaler/mindspark: "owned"
