name: CI/CD — build, test, dockerize, push, deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR: 726412861887.dkr.ecr.us-east-1.amazonaws.com
  CLUSTER: mindspark

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- TEST ----------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Test backend (smoke import)
        run: |
          cd backend
          pip install -r requirements.txt
          python -c "import app.main; print('backend import OK')"

      # ---------- AWS / ECR LOGIN ----------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR

      # ---------- DOCKERIZE + PUSH ----------
      - name: Build & push backend
        run: |
          docker build -t $ECR/mindspark/backend:${{ github.sha }} -t $ECR/mindspark/backend:latest ./backend
          docker push $ECR/mindspark/backend:${{ github.sha }}
          docker push $ECR/mindspark/backend:latest

      - name: Build & push ai-service
        run: |
          docker build -t $ECR/mindspark/ai-service:${{ github.sha }} -t $ECR/mindspark/ai-service:latest ./ai-service
          docker push $ECR/mindspark/ai-service:${{ github.sha }}
          docker push $ECR/mindspark/ai-service:latest

      # ---------- DEPLOY OTOMATIS ----------
      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name $CLUSTER --region $AWS_REGION
          kubectl -n backend set image deploy/backend backend=$ECR/mindspark/backend:${{ github.sha }}
          kubectl -n ai set image deploy/ai-service ai-service=$ECR/mindspark/ai-service:${{ github.sha }}
          kubectl -n backend rollout status deploy/backend --timeout=300s
          kubectl -n ai rollout status deploy/ai-service --timeout=300s
