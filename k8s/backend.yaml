# Backend API (auth, materials, quiz, chat-proxy) — namespace "backend"
# Memanggil AI Service lintas-namespace via DNS internal cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 726412861887.dkr.ecr.us-east-1.amazonaws.com/mindspark/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: AI_SERVICE_URL
              value: "http://ai-service.ai.svc.cluster.local:8001"
            - name: AZURE_STORAGE_CONTAINER
              value: "materials"
            - name: FRONTEND_ORIGIN
              value: "http://localhost:8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: JWT_SECRET
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AZURE_STORAGE_CONNECTION_STRING
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 25
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
