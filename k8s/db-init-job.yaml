# Job sekali-jalan: aktifkan pgvector + buat tabel di RDS (dari dalam cluster).
# Pod ini jalan di node EKS (Backend VPC) → menjangkau RDS (Database VPC) lewat Transit Gateway.
# schema.sql di-mount dari ConfigMap "db-schema"; DATABASE_URL diambil dari Secret "ai-secrets".
apiVersion: batch/v1
kind: Job
metadata:
  name: db-init
  namespace: ai
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: psql
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - 'psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f /schema/schema.sql && echo "=== SCHEMA_LOADED_OK ==="'
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: DATABASE_URL
          volumeMounts:
            - name: schema
              mountPath: /schema
      volumes:
        - name: schema
          configMap:
            name: db-schema
